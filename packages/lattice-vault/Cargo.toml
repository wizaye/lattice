[package]
name = "lattice-vault"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.11"
lazy_static = "1.5"
chrono = { version = "0.4", features = ["serde"] }
notify = "7.0"
notify-debouncer-full = "0.4"
tokio = { version = "1", features = ["full"] }
dashmap = "6.1"
walkdir = "2.5"
thiserror = "2.0"
tracing = "0.1"

[dev-dependencies]
tempfile = "3.14"
