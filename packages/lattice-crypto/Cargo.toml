[package]
name = "lattice-crypto"
version = "0.1.0"
edition = "2021"
description = "Isolated cryptographic primitives for Lattice — do not distribute source separately"

[dependencies]
# XChaCha20-Poly1305: authenticated encryption with 192-bit nonce
# (longer nonce removes the "never reuse a nonce" footgun that plain
# ChaCha20 has — random 24-byte nonce is safe for >2^64 messages).
chacha20poly1305 = "0.10"

# Argon2id: password → key derivation, OWASP-recommended parameters.
argon2 = "0.5"

# CSPRNG for nonce + salt generation.
rand = "0.8"

# Typed errors — avoids stringly-typed error propagation inside the
# crypto layer.
thiserror = "1"

# Zeroize key material on drop so decrypted bytes don't linger in
# freed heap pages.
zeroize = { version = "1", features = ["derive"] }

# Serialisation for the on-disk salt + config envelope.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
